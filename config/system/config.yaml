# 联系主人设置
sendMaster:
  openTips: |-
    联系主人开关
  open: true
  cdTips: |-
    联系主人CD 单位: 秒 填0关闭cd
  cd: 30
  MasterTips: |-
    是否发送全部主人 0: 仅发送首个主人 1: 发送全部主人 
    填主人账号可以指定发送某个主人
  Master: 0
  BotIdTips: |-
    指定某个Bot发送 为0时为触发Bot
  BotId: 0
  MsgTemplateTips: |-
    发送给主人的消息
    支持变量:
    key 消息标识，用于回复消息时调用，如果不需要回复可以删掉
    avatar 发送者头像
    platform 平台信息 如 QQ、微信等
    user 触发者信息
    gloup 群聊信息 私聊时显示私聊
    bot 触发Bot信息
    time 发送时间
    msg 消息内容
  MsgTemplate: |-
    {{key}}
    {{avatar}}
    平台: {{platform}}
    用户: {{user}}
    来自: {{group}}
    BOT: {{bot}}
    时间: {{time}}
    消息内容:
    {{msg}}
    -------------
    引用该消息：#联系回复 <内容>

  successMsgTemplateTips: |-
    消息发送成功后返回的消息
    可用参数:
    masterQQ 主人的QQ
  successMsgTemplate: |-
    ✅ 消息已送达
    主人的QQ: {{masterQQ}}

  failsMsgTemplateTips: |-
    失败时发送的消息
    可用参数:
    masterQQ 主人的QQ
  failsMsgTemplate: |-
    ❎ 消息发送失败，请尝试自行联系：{{masterQQ}}

  replyMsgTemplateTips: |-
    主人回复时发送的消息
    可用参数:
    nickname 主人昵称
    id 进行回复操作的主人账号
    msg 消息内容
  replyMsgTemplate: |-
    主人 {{nickname}}({{id}}) 回复:
    {{msg}}

  banWordsTips: |-
    违禁词，当消息包含下列内容将不会发送给主人
  banWords: []
  banUserTips: |-
    禁用的用户，不允许该用户联系主人
  banUser: []
  banGroupTips: |-
    禁用的群聊，不允许通过该群联系主人
  banGroup: []

